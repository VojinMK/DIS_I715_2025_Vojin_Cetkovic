name: SportifyShop CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install shared libraries
        run: |
          cd Util
          mvn clean install -DskipTests

          cd ../ServiceLibrary
          mvn clean install -DskipTests

      - name: Test user-service
        run: |
          cd user-service
          mvn clean test

      - name: Test ProductService
        run: |
          cd ProductService
          mvn clean test

      - name: Test StockService
        run: |
          cd StockService
          mvn clean test

      - name: Test OrderService
        run: |
          cd OrderService
          mvn clean test

      - name: Test EmailService
        run: |
          cd EmailService
          mvn clean test

      - name: Package infrastructure services
        run: |
          cd NamingServer
          mvn clean package -DskipTests

          cd ../config-server
          mvn clean package -DskipTests

          cd ../ApiGateway
          mvn clean package -DskipTests

      - name: Package business services
        run: |
          cd user-service
          mvn clean package -DskipTests

          cd ../ProductService
          mvn clean package -DskipTests

          cd ../StockService
          mvn clean package -DskipTests

          cd ../OrderService
          mvn clean package -DskipTests

          cd ../EmailService
          mvn clean package -DskipTests

      - name: Build Docker images
        run: |
          docker build -t naming-server:ci ./NamingServer
          docker build -t config-server:ci ./config-server
          docker build -t api-gateway:ci ./ApiGateway
          docker build -t user-service:ci ./user-service
          docker build -t product-service:ci ./ProductService
          docker build -t stock-service:ci ./StockService
          docker build -t order-service:ci ./OrderService
          docker build -t email-service:ci ./EmailService

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker images to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-naming-server:latest ./NamingServer
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-naming-server:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-config-server:latest ./config-server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-config-server:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-api-gateway:latest ./ApiGateway
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-api-gateway:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-user-service:latest ./user-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-user-service:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-product-service:latest ./ProductService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-product-service:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-stock-service:latest ./StockService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-stock-service:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-order-service:latest ./OrderService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-order-service:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sportify-email-service:latest ./EmailService
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sportify-email-service:latest
